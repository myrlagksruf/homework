<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        #p{
            background-color: black;
            width:max-content;
            padding: 10px;
            border-radius: 50% / 10%;
        }
        .i{
            border-radius: 50%;
            width: 200px;
            height:200px;
            margin: 10px;
            transition: all 0.5s ease;
            background-color: gray;
        }
        #x:hover{
            background-color: #ff0000;
        }
        #y:hover{
            background-color: #ffff00;
        }
        #z:hover{
            background-color: #00ff00;
        }
    </style>
</head>
<body>
    <h1>마우스를 올려보세요.</h1>
    <div id="p">
        <div class="i" id="x"></div>
        <div class="i" id="y"></div>
        <div class="i" id="z"></div>
    </div>
</body>

</script>
</html>
