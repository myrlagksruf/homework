<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        img{
            transition:all 1s;  
        }
        img:hover{
            filter:hue-rotate(120deg);
        }
    </style>
</head>
<body>
    <h1>마리오를 루이지로</h1>
    <h4>힌트 filter :hue-rotate</h4>
    <img src="mario.png">
</body>
</html>
