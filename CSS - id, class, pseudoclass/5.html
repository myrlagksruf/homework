<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>1.html</title>
    <style>
        div{
            background-color: gray;
            width: 300px;
            height: 300px;
        }
        
        div:hover{
            background-image: url("피카츄.gif");
            background-size: 25%;
        }

        div:active{
            background-color: blue;
            background-size: 10%;
        }
    </style>
</head>
<body>
    <div></div>
    <ul>
        <li>크기 : width : 300px, height : 300px</li>
        <li>마우스 올렸을 때 : 배경이미지 바뀜<img src="피카츄.gif" height="30"> 배경사이즈 : 25%</li>
        <li>클릭했을 때 : 배경사이즈 : 10%, 배경색 : blue</li>
    </ul>
</body>
</html>
