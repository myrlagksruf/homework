<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        body{
            max-width: 1000px;
        }
        header{
            text-align: center;
            border: 5px solid blue;
            background-color: aquamarine;
            margin: 30px 0;
        }
        .menu{
            font-size:2em;
            padding: 10px;
            color:darkblue;
            display: inline-block;
            margin: 10px;
            background-color: blanchedalmond;
            border: 3px dashed cornflowerblue;
        }
        main{
            float: left;
            width:70%;
            height: 800px;
            border: 5px solid red;
            background-color: lightpink;
            margin-bottom: 30px;
        }
        section{
            float: right;
            width:25%;
            height: 500px;
            background-color: lightskyblue;
            border: 5px solid green;    
        }
        footer{
            clear:both;
            width:100%;
            height: 80px;
            background-color: greenyellow;
            border: 5px solid yellow;
            text-align: center;
        }
    </style>
</head>
<body>
    <header><div class="menu">메뉴1</div><div class="menu">메뉴2</div><div class="menu">메뉴3</div><div class="menu">메뉴4</div></header>
    <main>내용내용ㅎㅎㅎㅎ</main>
    <section>사이드바<br>사이드바<br>사이드바<br>사이드바<br>사이드바<br></section>
    <footer>㈜인코딩 학원</footer>
</body>
</html>
