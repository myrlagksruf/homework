<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style type="text/css">
            ul{
                margin-top: 0;
                margin-bottom: 0;
            }
            .dt {
                background: #B8C1C8;
                border-bottom: 1px solid #989EA4;
                border-top: 1px solid #717D85;
                color: #FFF;
                font: bold 18px/21px Helvetica, Arial, sans-serif;
                margin: 0;
                padding: 0;
                position: sticky;
                top: -1px;
            }
            li {
                font: bold 20px/45px Helvetica, Arial, sans-serif;
                margin: 0;
                padding: 0;
                white-space: nowrap;
            }
            #cont{
                height:300px;
                overflow: auto;
            }
        </style>
    </head>
    <body>
        <div id="cont">
            <div>
                <ul>
                    <li class="dt">A</li>
                    <li>Andrew W.K.</li>
                    <li>Apparat</li>
                    <li>Arcade Fire</li>
                    <li>At The Drive-In</li>
                    <li>Aziz Ansari</li>
                </ul>
            </div>
            <div>
                <ul>
                    <li class="dt">C</li>
                    <li>Chromeo</li>
                    <li>Common</li>
                    <li>Converge</li>
                    <li>Crystal Castles</li>
                    <li>Cursive</li>
                </ul>
            </div>
            <div>
                <ul>
                    <li class="dt">E</li>
                    <li>Explosions In The Sky</li>
                </ul>
            </div>
            <div>
                <ul>
                    <li class="dt">T</li>
                    <li>Ted Leo &amp; The Pharmacists</li>
                    <li>T-Pain</li>
                    <li>Thrice</li>
                    <li>TV On The Radio</li>
                    <li>Two Gallants</li>
                </ul>
            </div>
        </div>
    </body>
</html>
