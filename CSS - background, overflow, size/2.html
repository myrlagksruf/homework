<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        div{
            font-size:120px;
            color:rgb(0,0,0,0.5);
            width:fit-content;
            background-image: url('조용히.gif');
            background-position-x:center;
            background-repeat: no-repeat;
            background-size:auto 100%;
        }
    </style>
</head>
<body>
    <div>조용히 하세요!</div>
    <ul>
        <li><img src="조용히.gif" width="50">비슷하게만 만들면됩니다.</li>
        <li>다만 만약 할 수 있다면 background-size 속성과</li>
        <li>width: fit-content 속성을 인터넷에서 찾아보세요~</li>
    </ul>
</body>
</html>
